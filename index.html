<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <!-- 原有样式保持不变 -->
</head>
<body>
  <!-- 原有HTML结构完全不变 -->
  
  <!-- 新增Token设置弹窗 -->
  <div class="modal" id="tokenModal">
    <div class="modal-content">
      <div class="modal-title">GitHub Token 设置</div>
      <div class="admin-form-group">
        <label class="admin-form-label">GitHub Personal Access Token</label>
        <input type="password" class="admin-form-input" id="githubTokenInput" placeholder="输入你的GitHub Token（仅本地保存）">
        <div style="font-size: 12px; color: #666; margin-top: 5px;">
          🔒 Token仅保存在本地浏览器，不会上传或泄露
        </div>
      </div>
      <div class="admin-form-group">
        <label class="admin-form-label">同步模式</label>
        <select class="admin-form-input" id="syncModeSelect">
          <option value="auto">自动同步（实时）</option>
          <option value="manual">手动同步（点击触发）</option>
        </select>
      </div>
      <div class="modal-footer">
        <button class="modal-btn modal-btn-cancel" id="cancelTokenBtn">取消</button>
        <button class="modal-btn modal-btn-confirm" id="saveTokenBtn">保存设置</button>
      </div>
    </div>
  </div>
  
  <!-- 原有引入库保持不变 -->
  <script>
    // --------------- 仓库数据配置（修改）---------------
    const REPO_CONFIG = {
      owner: 'MDJTL',
      repo: '.github.io',
      path: 'store_data.json',
      branch: 'main',
      readUrl: 'https://raw.githubusercontent.com/MDJTL/.github.io/main/store_data.json',
      apiUrl: 'https://api.github.com/repos/MDJTL/.github.io/contents/store_data.json'
    };

    // --------------- 系统配置（新增同步相关）---------------
    const SYSTEM_CONFIG = {
      adminDefaultPwd: 'admin123',
      defaultExpireDays: 30,
      minPwdLength: 6,
      expireWarnDays: 3,
      defaultPayOwner: '便利店管理',
      defaultContact: '电话13800000000',
      syncDebounceTime: 1000, // 同步防抖时间
      syncRetryTimes: 3,      // 同步失败重试次数
      syncRetryDelay: 2000    // 重试延迟
    };

    // --------------- 全局核心数据（新增同步配置）---------------
    let GLOBAL_DATA = {
      userList: [],
      payQrcode: '',
      payOwner: SYSTEM_CONFIG.defaultPayOwner,
      contactInfo: SYSTEM_CONFIG.defaultContact,
      renewalLog: [],
      unreadRenewal: [],
      useLog: [],
      syncConfig: {
        token: '',
        syncMode: 'auto',
        lastSyncTime: '',
        syncEnabled: false
      }
    };

    // --------------- 设备本地状态（新增同步相关）---------------
    const LOCAL_STATE = {
      isLogin: false,
      currentUser: null,
      goods: [],
      total: 0,
      checked: 0,
      diffs: [],
      currentGoods: null,
      editUserId: null,
      resetStoreUserId: null,
      syncLock: false, // 同步锁，防止并发
      syncDebounceTimer: null // 防抖定时器
    };

    // --------------- DOM元素（新增Token相关）---------------
    const el = {
      // 原有元素保持不变...
      
      // 新增Token设置弹窗元素
      tokenModal: document.getElementById('tokenModal'),
      githubTokenInput: document.getElementById('githubTokenInput'),
      syncModeSelect: document.getElementById('syncModeSelect'),
      cancelTokenBtn: document.getElementById('cancelTokenBtn'),
      saveTokenBtn: document.getElementById('saveTokenBtn'),
      // 新增同步按钮（在管理员弹窗中显示）
      syncNowBtn: null,
      tokenSettingBtn: null
    };

    // --------------- 新增安全工具函数 ---------------
    // 加密存储Token（简单加密，防止本地明文泄露）
    function encryptToken(token) {
      if (!token) return '';
      // 使用简单的Base64 + 随机盐值加密
      const salt = 'store_' + new Date().getFullYear();
      return btoa(salt + token + salt);
    }

    // 解密Token
    function decryptToken(encryptedToken) {
      if (!encryptedToken) return '';
      try {
        const decrypted = atob(encryptedToken);
        const salt = 'store_' + new Date().getFullYear();
        return decrypted.replace(new RegExp(salt, 'g'), '');
      } catch (e) {
        return '';
      }
    }

    // 从本地存储加载Token
    function loadTokenFromLocal() {
      try {
        const encryptedToken = localStorage.getItem('github_token_encrypted');
        const syncMode = localStorage.getItem('sync_mode') || 'auto';
        GLOBAL_DATA.syncConfig.token = decryptToken(encryptedToken);
        GLOBAL_DATA.syncConfig.syncMode = syncMode;
        GLOBAL_DATA.syncConfig.syncEnabled = !!GLOBAL_DATA.syncConfig.token;
        GLOBAL_DATA.syncConfig.lastSyncTime = localStorage.getItem('last_sync_time') || '';
      } catch (e) {
        console.error('加载Token失败:', e);
        GLOBAL_DATA.syncConfig.syncEnabled = false;
      }
    }

    // 保存Token到本地存储
    function saveTokenToLocal(token, syncMode) {
      try {
        const encryptedToken = encryptToken(token);
        localStorage.setItem('github_token_encrypted', encryptedToken);
        localStorage.setItem('sync_mode', syncMode);
        GLOBAL_DATA.syncConfig.token = token;
        GLOBAL_DATA.syncConfig.syncMode = syncMode;
        GLOBAL_DATA.syncConfig.syncEnabled = !!token;
        showToast('Token已安全保存到本地');
      } catch (e) {
        showToast('保存Token失败：' + e.message);
      }
    }

    // --------------- 新增GitHub API同步函数 ---------------
    // 获取文件SHA（用于更新）
    async function getFileSha() {
      if (!GLOBAL_DATA.syncConfig.token) return '';
      try {
        const response = await fetch(REPO_CONFIG.apiUrl, {
          headers: {
            'Authorization': `token ${GLOBAL_DATA.syncConfig.token}`,
            'Accept': 'application/vnd.github.v3+json'
          }
        });
        if (response.ok) {
          const data = await response.json();
          return data.sha || '';
        } else {
          console.error('获取SHA失败:', response.status);
          return '';
        }
      } catch (e) {
        console.error('获取SHA异常:', e);
        return '';
      }
    }

    // 从GitHub拉取最新数据（实时同步）
    async function pullFromGitHub(retry = 0) {
      if (!GLOBAL_DATA.syncConfig.syncEnabled || LOCAL_STATE.syncLock) return false;
      
      LOCAL_STATE.syncLock = true;
      try {
        showSyncTip('🔄 正在拉取最新数据...');
        
        // 添加时间戳防止缓存
        const timestamp = new Date().getTime();
        const response = await fetch(`${REPO_CONFIG.readUrl}?t=${timestamp}`, {
          headers: {
            'Authorization': `token ${GLOBAL_DATA.syncConfig.token}`,
            'Cache-Control': 'no-cache'
          }
        });
        
        if (response.ok) {
          const data = await response.json();
          // 深度拷贝
          GLOBAL_DATA = JSON.parse(JSON.stringify({
            ...data,
            syncConfig: GLOBAL_DATA.syncConfig // 保留本地同步配置
          }));
          
          // 更新本地备份
          localStorage.setItem('store_data_backup', JSON.stringify(GLOBAL_DATA));
          sessionStorage.setItem('store_data_temp', JSON.stringify(GLOBAL_DATA));
          
          GLOBAL_DATA.syncConfig.lastSyncTime = formatDateTime(new Date());
          localStorage.setItem('last_sync_time', GLOBAL_DATA.syncConfig.lastSyncTime);
          
          showSyncTip('✅ 数据同步成功', 2000);
          
          // 更新UI
          if (LOCAL_STATE.currentUser && LOCAL_STATE.currentUser.role === 'admin') {
            renderUserList();
            renderRenewalLog();
            renderUseLog();
            loadQrcodePreview();
          }
          
          return true;
        } else if (retry < SYSTEM_CONFIG.syncRetryTimes) {
          showSyncTip(`⚠️ 拉取失败，${SYSTEM_CONFIG.syncRetryDelay/1000}秒后重试（${retry+1}/${SYSTEM_CONFIG.syncRetryTimes}）`);
          await new Promise(resolve => setTimeout(resolve, SYSTEM_CONFIG.syncRetryDelay));
          return await pullFromGitHub(retry + 1);
        } else {
          showSyncTip('❌ 同步失败，使用本地数据', 3000);
          return false;
        }
      } catch (e) {
        if (retry < SYSTEM_CONFIG.syncRetryTimes) {
          await new Promise(resolve => setTimeout(resolve, SYSTEM_CONFIG.syncRetryDelay));
          return await pullFromGitHub(retry + 1);
        } else {
          console.error('拉取数据异常:', e);
          showSyncTip('❌ 同步异常，使用本地数据', 3000);
          return false;
        }
      } finally {
        LOCAL_STATE.syncLock = false;
      }
    }

    // 推送数据到GitHub（实时同步）
    async function pushToGitHub(retry = 0) {
      if (!GLOBAL_DATA.syncConfig.syncEnabled || LOCAL_STATE.syncLock) return false;
      
      LOCAL_STATE.syncLock = true;
      try {
        showSyncTip('🔄 正在推送数据到GitHub...');
        
        // 获取文件SHA
        const sha = await getFileSha();
        
        // 准备推送数据
        const dataToPush = {
          ...GLOBAL_DATA,
          syncConfig: {
            ...GLOBAL_DATA.syncConfig,
            lastSyncTime: formatDateTime(new Date())
          }
        };
        const content = btoa(unescape(encodeURIComponent(JSON.stringify(dataToPush, null, 2))));
        
        const response = await fetch(REPO_CONFIG.apiUrl, {
          method: 'PUT',
          headers: {
            'Authorization': `token ${GLOBAL_DATA.syncConfig.token}`,
            'Accept': 'application/vnd.github.v3+json',
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            message: `[Auto Sync] ${new Date().toLocaleString()}`,
            content: content,
            sha: sha,
            branch: REPO_CONFIG.branch
          })
        });
        
        if (response.ok) {
          // 更新本地同步时间
          localStorage.setItem('last_sync_time', dataToPush.syncConfig.lastSyncTime);
          showSyncTip('✅ 数据已同步到GitHub', 2000);
          return true;
        } else if (retry < SYSTEM_CONFIG.syncRetryTimes) {
          const errorText = await response.text();
          console.error('推送失败:', response.status, errorText);
          showSyncTip(`⚠️ 推送失败，${SYSTEM_CONFIG.syncRetryDelay/1000}秒后重试（${retry+1}/${SYSTEM_CONFIG.syncRetryTimes}）`);
          await new Promise(resolve => setTimeout(resolve, SYSTEM_CONFIG.syncRetryDelay));
          return await pushToGitHub(retry + 1);
        } else {
          showSyncTip('❌ 推送失败，数据已保存到本地', 3000);
          return false;
        }
      } catch (e) {
        if (retry < SYSTEM_CONFIG.syncRetryTimes) {
          await new Promise(resolve => setTimeout(resolve, SYSTEM_CONFIG.syncRetryDelay));
          return await pushToGitHub(retry + 1);
        } else {
          console.error('推送数据异常:', e);
          showSyncTip('❌ 推送异常，数据已保存到本地', 3000);
          return false;
        }
      } finally {
        LOCAL_STATE.syncLock = false;
      }
    }

    // 防抖同步函数
    function debounceSync(func, wait) {
      return function(...args) {
        clearTimeout(LOCAL_STATE.syncDebounceTimer);
        LOCAL_STATE.syncDebounceTimer = setTimeout(() => {
          func.apply(this, args);
        }, wait);
      };
    }

    // 自动同步函数（防抖版）
    const autoSync = debounceSync(async () => {
      if (GLOBAL_DATA.syncConfig.syncMode !== 'auto' || !GLOBAL_DATA.syncConfig.syncEnabled) return;
      // 先拉取最新数据，再推送本地修改
      await pullFromGitHub();
      await pushToGitHub();
    }, SYSTEM_CONFIG.syncDebounceTime);

    // 手动触发同步
    async function syncNow() {
      if (!GLOBAL_DATA.syncConfig.syncEnabled) {
        showToast('请先配置GitHub Token');
        return;
      }
      showSyncTip('🔄 正在手动同步数据...');
      const pullSuccess = await pullFromGitHub();
      const pushSuccess = await pushToGitHub();
      if (pullSuccess && pushSuccess) {
        showToast('✅ 手动同步完成');
      } else {
        showToast('⚠️ 同步部分失败，请检查网络或Token');
      }
    }

    // 打开Token设置弹窗
    function openTokenSettingModal() {
      el.githubTokenInput.value = GLOBAL_DATA.syncConfig.token;
      el.syncModeSelect.value = GLOBAL_DATA.syncConfig.syncMode;
      el.tokenModal.style.display = 'flex';
    }

    // 保存Token设置
    function saveTokenSetting() {
      const token = el.githubTokenInput.value.trim();
      const syncMode = el.syncModeSelect.value;
      saveTokenToLocal(token, syncMode);
      el.tokenModal.style.display = 'none';
      // 立即测试同步
      if (token) {
        syncNow();
      }
    }

    // --------------- 修改原有保存函数，增加自动同步 ---------------
    async function saveToRepo() {
      try {
        showSyncTip('💾 正在保存数据到本地...');
        // 原有本地保存逻辑
        localStorage.setItem('store_data_backup', JSON.stringify(GLOBAL_DATA));
        sessionStorage.setItem('store_data_temp', JSON.stringify(GLOBAL_DATA));
        showSyncTip('✅ 数据保存成功（本地持久化）', 1500);
        
        // 新增：自动同步到GitHub
        if (GLOBAL_DATA.syncConfig.syncEnabled && GLOBAL_DATA.syncConfig.syncMode === 'auto') {
          autoSync();
        }
        
        return true;
      } catch (error) {
        showToast('❌ 保存失败：' + error.message);
        return false;
      }
    }

    // --------------- 修改原有loadFromRepo函数，增加拉取 ---------------
    async function loadFromRepo() {
      try {
        showSyncTip('正在同步最新数据...');
        
        // 先加载本地Token
        loadTokenFromLocal();
        
        // 尝试从GitHub拉取
        let pullSuccess = false;
        if (GLOBAL_DATA.syncConfig.syncEnabled) {
          pullSuccess = await pullFromGitHub();
        }
        
        if (!pullSuccess) {
          // 备用：读取本地数据
          const localData = localStorage.getItem('store_data_backup');
          if (localData) {
            try {
              const parsedData = JSON.parse(localData);
              GLOBAL_DATA = {
                ...parsedData,
                syncConfig: GLOBAL_DATA.syncConfig // 保留同步配置
              };
              showSyncTip('📱 使用本地最新数据', 2000);
            } catch (e) {
              console.error('本地数据解析失败，初始化默认数据:', e);
              initDefaultData();
            }
          } else {
            // 初始化默认数据
            initDefaultData();
            await saveToRepo();
          }
        }
        
        return true;
      } catch (error) {
        console.error('从GitHub同步失败，使用本地数据:', error);
        // 备用方案
        const localData = localStorage.getItem('store_data_backup');
        if (localData) {
          try {
            GLOBAL_DATA = JSON.parse(localData);
            loadTokenFromLocal(); // 重新加载Token配置
            showSyncTip('📱 使用本地最新数据', 2000);
          } catch (e) {
            initDefaultData();
          }
        } else {
          initDefaultData();
          await saveToRepo();
        }
        return true;
      }
    }

    // --------------- 修改管理员授权函数，添加同步按钮 ---------------
    function adminAuth() {
      const pwd = el.adminPassword.value.trim();
      if (!pwd) { showToast('请输入管理员密码'); return; }
      const admin = GLOBAL_DATA.userList.find(u => u.role === 'admin' && u.password === pwd);
      if (!admin) { showToast('管理员密码错误'); return; }
      el.adminAuth.style.display = 'none';
      el.adminManage.style.display = 'block';
      loadQrcodePreview();
      renderUserList();
      
      // 新增：添加同步按钮
      const buttonContainer = document.querySelector('#adminManage > div:first-child');
      // 创建Token设置按钮
      if (!el.tokenSettingBtn) {
        el.tokenSettingBtn = document.createElement('button');
        el.tokenSettingBtn.className = 'modal-btn modal-btn-confirm';
        el.tokenSettingBtn.style = 'flex: none; width: auto; padding: 8px 15px; background:#1890ff; margin-left: 8px;';
        el.tokenSettingBtn.textContent = '⚙️ Token设置';
        el.tokenSettingBtn.addEventListener('click', openTokenSettingModal);
        buttonContainer.appendChild(el.tokenSettingBtn);
      }
      
      // 创建手动同步按钮
      if (!el.syncNowBtn) {
        el.syncNowBtn = document.createElement('button');
        el.syncNowBtn.className = 'modal-btn modal-btn-confirm';
        el.syncNowBtn.style = 'flex: none; width: auto; padding: 8px 15px; background:#52c41a; margin-left: 8px;';
        el.syncNowBtn.textContent = '🔄 立即同步';
        el.syncNowBtn.addEventListener('click', syncNow);
        buttonContainer.appendChild(el.syncNowBtn);
      }
      
      // 绑定日志展开/收起（原有逻辑）
      el.toggleRenewalLog.addEventListener('click', () => {
        if (el.renewalLogList.style.display === 'none') {
          el.renewalLogList.style.display = 'block';
          el.toggleRenewalLog.textContent = '收起';
        } else {
          el.renewalLogList.style.display = 'none';
          el.toggleRenewalLog.textContent = '展开';
        }
      });
      el.toggleUseLog.addEventListener('click', () => {
        if (el.useLogList.style.display === 'none') {
          el.useLogList.style.display = 'block';
          el.toggleUseLog.textContent = '收起';
        } else {
          el.useLogList.style.display = 'none';
          el.toggleUseLog.textContent = '展开';
        }
      });
    }

    // --------------- 修改事件绑定，添加Token相关 ---------------
    function bindEvents() {
      // 原有事件绑定保持不变...
      
      // 新增Token设置弹窗事件
      el.cancelTokenBtn.addEventListener('click', () => el.tokenModal.style.display = 'none');
      el.saveTokenBtn.addEventListener('click', saveTokenSetting);
      
      // 页面加载时自动同步
      window.addEventListener('load', async () => {
        await loadFromRepo();
        // 每5分钟自动拉取一次（防止长时间未操作导致数据不一致）
        setInterval(() => {
          if (GLOBAL_DATA.syncConfig.syncEnabled && LOCAL_STATE.isLogin) {
            pullFromGitHub();
          }
        }, 5 * 60 * 1000);
      });
      
      // 窗口聚焦时同步
      window.addEventListener('focus', async () => {
        if (GLOBAL_DATA.syncConfig.syncEnabled && LOCAL_STATE.isLogin) {
          pullFromGitHub();
        }
      });
    }

    // --------------- 原有函数保持不变 ---------------
    // ... 所有原有函数都保留 ...

    // 初始化
    bindEvents();
  </script>
</body>
</html>
